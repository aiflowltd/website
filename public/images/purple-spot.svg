<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="none" width="1200" height="800">
  <defs>
    <!-- Soft, fading “blob” -->
    <radialGradient id="fadeCirclePurple" cx="50%" cy="50%" r="50%">
      <!-- Center color -->
      <stop offset="0%" stop-color="#748dfc" stop-opacity="0.55"/>
      <!-- Mid fade -->
      <stop offset="45%" stop-color="#748dfc" stop-opacity="0.28"/>
      <!-- Edge fade to transparent -->
      <stop offset="75%" stop-color="#748dfc" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#748dfc" stop-opacity="0"/>
    </radialGradient>

    <!-- Extra softness (optional, but looks closer to your screenshot) -->
    <filter id="softBlurPurple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <!-- You can keep the SVG background transparent, or set one here -->
  <!-- <rect width="100%" height="100%" fill="#ffffff"/> -->

  <!-- Main fading circle -->
  <circle cx="600" cy="400" r="340" fill="url(#fadeCirclePurple)" filter="url(#softBlurPurple)"/>
</svg>